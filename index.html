<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudBudget</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
  <header class="main-header">
    <div class="navbar content-wrap d-flex">
      <nav class="d-flex vertical-center">
        <div class="logo d-flex">
          <img src="assets/images/logo.svg" alt="main logo">
          <span class="uppercase">CloudBudget</span>
        </div>
        <div id="iconBlock" class="menu-icon">
          <div id="iconOpen" class="menu-icon-open"><i class="fa-solid fa-bars"></i></div>
          <div id="iconClose" class="menu-icon-close d-none"><i class="fa-solid fa-xmark"></i></div>
        </div>
        <ul id="mainMenu" class="main-menu d-flex">
          <li><a href="#" class="uppercase">Features</a></li>
          <li><a href="#" class="uppercase">Technology</a></li>
          <li><a href="#" class="uppercase">Contact</a></li>
          <li><a href="#" class="uppercase">Sign up</a></li>
        </ul>
        <button id="loginBtn" class="btn btn_login">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          <span>Login</span>
        </button>
      </nav>      
    </div>

    <div class="header-content-wrap d-flex item-center content-wrap">
      <h1 class="header-title uppercase">CloudBudget</h1>
      <p class="header-subtitle">
        Cloud budget management for everyone. Only €69.95 a Month After a 7 Day Trial of 
        Up to €4.99
      </p>
      <button class="btn btn__light uppercase">
        Sign Up
      </button>
    </div>

  </header>


  

  <div id="modal" class="modal-wrap d-none">
    <div class="modal d-flex item-center">
      <div id="closeModal" class="close-modal">
        <i class="fa-solid fa-xmark"></i>
      </div>
      <form action="#" class="modal-form d-flex item-center">
        <label for="username">Username:</label>
        <input id="username" type="text">
        <label for="password">Username:</label>
        <input id="password" type="password">
        <input type="submit" class="btn btn__light">
      </form>
    </div>
  </div>
  <script src="assets/js/script.js"></script>
</body>

</html>
